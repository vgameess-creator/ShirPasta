<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הזמנות פסטה - UX/UI Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="controls-section">
            
            <div class="control-box">
                <h3>צורת פסטה <span class="badge">חובה</span></h3>
                <div class="options-grid">
                    <label><input type="radio" name="pasta-shape" value="ספגטי"><span class="chip">ספגטי</span></label>
                    <label><input type="radio" name="pasta-shape" value="פנה"><span class="chip">פנה</span></label>
                    <label><input type="radio" name="pasta-shape" value="פוזילי"><span class="chip">פוזילי</span></label>
                    <label><input type="radio" name="pasta-shape" value="פרפלה"><span class="chip">פרפלה</span></label>
                </div>
            </div>

            <div class="control-box">
                <h3>רוטב</h3>
                <div class="options-grid">
                    <label><input type="radio" name="sauce" value="שמנת"><span class="chip">שמנת</span></label>
                    <label><input type="radio" name="sauce" value="עגבניות"><span class="chip">עגבניות</span></label>
                    <label><input type="radio" name="sauce" value="רוזה"><span class="chip">רוזה</span></label>
                    <label><input type="radio" name="sauce" value="פסטו"><span class="chip">פסטו</span></label>
                    <label><input type="radio" name="sauce" value="פטריות"><span class="chip">פטריות</span></label>
                    <label><input type="radio" name="sauce" value="ללא רוטב"><span class="chip">ללא רוטב</span></label>
                </div>
            </div>

            <div class="control-box">
                <h3>תוספות</h3>
                <div class="options-grid">
                    <label><input type="checkbox" name="topping" value="לחם שום"><span class="chip">לחם שום</span></label>
                    <label><input type="checkbox" name="topping" value="גבינת פרמזן"><span class="chip">פרמזן</span></label>
                    <label><input type="checkbox" name="topping" value="ציפס"><span class="chip">צ'יפס</span></label>
                    <label><input type="checkbox" name="topping" value="טבעות בצל"><span class="chip">טבעות בצל</span></label>
                    <label><input type="checkbox" name="topping" value="סלט ירקות"><span class="chip">סלט ירקות</span></label>
                    <label><input type="checkbox" name="topping" value="סלט יווני"><span class="chip">סלט יווני</span></label>
                </div>
            </div>

            <div class="control-box">
                <h3>שתייה</h3>
                <div class="options-grid">
                    <label><input type="checkbox" name="drink" value="מיץ תפוזים"><span class="chip">תפוזים</span></label>
                    <label><input type="checkbox" name="drink" value="תה קר"><span class="chip">תה קר</span></label>
                    <label><input type="checkbox" name="drink" value="קולה"><span class="chip">קולה</span></label>
                    <label><input type="checkbox" name="drink" value="פאנטה"><span class="chip">פאנטה</span></label>
                    <label><input type="checkbox" name="drink" value="תה חם"><span class="chip">תה חם</span></label>
                    <label><input type="checkbox" name="drink" value="אספרסו"><span class="chip">אספרסו</span></label>
                    <label><input type="checkbox" name="drink" value="מים"><span class="chip">מים/סודה</span></label>
                    <label><input type="checkbox" name="drink" value="מיץ תפוחים קר"><span class="chip">תפוחים</span></label>
                </div>
            </div>

            <div class="control-box client-details">
                <div class="details-grid">
                    <div class="input-group">
                        <label>שם מלא:</label>
                        <input type="text" id="customer-name" placeholder="הכנס שם מלא">
                    </div>
                    <div class="input-group">
                        <label>הערות:</label>
                        <input type="text" id="customer-notes" placeholder="הערות מיוחדות להזמנה...">
                    </div>
                    <button id="submit-btn" class="submit-btn" disabled>שלח הזמנה</button>
                </div>
            </div>

        </aside>

        <main class="preview-section">
            <div class="preview-header">
                <h2>הזמנה ללקוח: <span id="display-name">...</span></h2>
            </div>
            
            <div class="preview-grid">
                <div class="grid-topping">
                    <h3>תוספות בצד:</h3>
                    <div id="toppings-container" class="items-gallery"></div>
                </div>

                <div class="grid-drink">
                    <h3>שתייה:</h3>
                    <div id="drinks-container" class="items-gallery"></div>
                </div>
                
                <div class="grid-main-dish">
                    <div id="empty-plate-placeholder" class="empty-placeholder">
                        <span class="icon">🍽️</span>
                        <p>בחר סוג פסטה להצגת המנה</p>
                    </div>
                    <img id="main-dish-img" src="" alt="מנה עיקרית" style="display: none;">
                </div>
            </div>
        </main>
    </div>

    <div id="summary-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>ההזמנה התקבלה בהצלחה! 🎉</h2>
            </div>
            <div class="modal-body">
                <p><strong>לקוח:</strong> <span id="summary-name"></span></p>
                <p><strong>מנה:</strong> <span id="summary-pasta"></span> ברוטב <span id="summary-sauce"></span></p>
                <p><strong>תוספות:</strong> <span id="summary-toppings"></span></p>
                <p><strong>שתייה:</strong> <span id="summary-drinks"></span></p>
                <p><strong>הערות:</strong> <span id="summary-notes"></span></p>
            </div>
            <button id="close-modal-btn">חזור לתפריט</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
