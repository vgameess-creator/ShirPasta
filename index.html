<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הזמנות פסטה - פרויקט סיכום</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="controls-section">
            
            <div class="control-box">
                <h3>שתייה קרה/חמה (צ'ק-בוקס)</h3>
                <label><input type="checkbox" name="drink" value="מיץ תפוזים"> מיץ תפוזים</label>
                <label><input type="checkbox" name="drink" value="תה קר"> תה קר</label>
                <label><input type="checkbox" name="drink" value="קולה"> קולה</label>
                <label><input type="checkbox" name="drink" value="פאנטה"> פאנטה</label>
                <label><input type="checkbox" name="drink" value="תה חם"> תה חם</label>
                <label><input type="checkbox" name="drink" value="אספרסו"> אספרסו</label>
                <label><input type="checkbox" name="drink" value="מים"> מים / סודה</label>
                <label><input type="checkbox" name="drink" value="מיץ תפוחים קר"> מיץ תפוחים</label>
            </div>

            <div class="control-box">
                <h3>צורת פסטה (כפתורי רדיו)</h3>
                <label><input type="radio" name="pasta-shape" value="ספגטי"> ספגטי</label>
                <label><input type="radio" name="pasta-shape" value="פנה"> פנה</label>
                <label><input type="radio" name="pasta-shape" value="פוזילי"> פוזילי</label>
                <label><input type="radio" name="pasta-shape" value="פרפלה"> פרפלה</label>
            </div>

            <div class="control-box">
                <h3>רוטב (כפתורי רדיו)</h3>
                <label><input type="radio" name="sauce" value="שמנת"> שמנת</label>
                <label><input type="radio" name="sauce" value="עגבניות"> עגבניות</label>
                <label><input type="radio" name="sauce" value="רוזה"> רוזה</label>
                <label><input type="radio" name="sauce" value="פסטו"> פסטו</label>
                <label><input type="radio" name="sauce" value="פטריות"> פטריות</label>
                <label><input type="radio" name="sauce" value="ללא רוטב"> ללא רוטב</label>
            </div>

            <div class="control-box">
                <h3>תוספת (צ'ק-בוקס)</h3>
                <label><input type="checkbox" name="topping" value="לחם שום"> לחם שום</label>
                <label><input type="checkbox" name="topping" value="גבינת פרמזן"> גבינת פרמזן</label>
                <label><input type="checkbox" name="topping" value="ציפס"> צ'יפס</label>
                <label><input type="checkbox" name="topping" value="טבעות בצל"> טבעות בצל</label>
                <label><input type="checkbox" name="topping" value="סלט ירקות"> סלט ירקות</label>
                <label><input type="checkbox" name="topping" value="סלט יווני"> סלט יווני</label>
            </div>

            <div class="control-box client-details">
                <h3>פרטי לקוח</h3>
                <div class="input-group">
                    <label>שם מלא:</label>
                    <input type="text" id="customer-name" placeholder="חובה למלא שם">
                </div>
                <div class="input-group">
                    <label>הערות להזמנה:</label>
                    <textarea id="customer-notes"></textarea>
                </div>
                <button id="submit-btn" class="submit-btn" disabled>שלחו הזמנה</button>
            </div>

        </aside>

        <main class="preview-section">
            <div class="preview-header">
                <h2>הזמנה ללקוח: <span id="display-name"></span></h2>
            </div>
            
            <div class="preview-grid">
                <div class="grid-drink">
                    <h3>שתייה:</h3>
                    <div id="drinks-container" class="items-gallery"></div>
                </div>
                
                <div class="grid-topping">
                    <h3>תוספות:</h3>
                    <div id="toppings-container" class="items-gallery"></div>
                </div>
                
                <div class="grid-main-dish">
                    <h3>מנה עיקרית (מוסתרת עד לבחירה):</h3>
                    <img id="main-dish-img" src="" alt="מנה עיקרית" style="display: none;">
                </div>
            </div>
        </main>
    </div>

    <div id="summary-modal" class="modal">
        <div class="modal-content">
            <h2>סיכום הזמנה</h2>
            <p><strong>שם הלקוח:</strong> <span id="summary-name"></span></p>
            <p><strong>צורת פסטה:</strong> <span id="summary-pasta"></span></p>
            <p><strong>רוטב:</strong> <span id="summary-sauce"></span></p>
            <p><strong>תוספות:</strong> <span id="summary-toppings"></span></p>
            <p><strong>שתייה:</strong> <span id="summary-drinks"></span></p>
            <p><strong>הערות:</strong> <span id="summary-notes"></span></p>
            <button id="close-modal-btn">אישור וסגירה</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
